# Triage loop: judge unjudged issues against the definition of ready,
# label them, and sync drift. See guides/loops.md.
#
# To use: copy to .github/workflows/triage.yml, create the labels
# (guides/labels.md has the commands), and add an ANTHROPIC_API_KEY
# repository secret.
#
# Triggers: every new issue gets triaged immediately; the weekday
# schedule catches drift (stale claims, merged-but-open issues,
# unblocked dependencies). Each run is idempotent and exits cleanly
# when there is nothing to do.

name: triage-loop

on:
  issues:
    types: [opened]
  schedule:
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            One tick of the triage loop for this repository.

            1. Find open issues with no agent:* or needs:* label. Judge
               each against the definition of ready in AGENTS.md:
               - Decision-complete: label agent:ready, add a risk grade
                 (risk:low or risk:high) and a type label.
               - Real problem, open decisions: label needs:spec and
                 comment the open decisions.
               - Too thin to act on: comment what is missing and label
                 needs:human.
               The label is the judgment. Do not pad thin issues into
               fake readiness.
            2. Sync drift: close issues whose linked PRs merged, release
               stale agent:working claims (24 hours, no branch or PR
               activity) back to agent:ready, and remove blocked where
               the blocking issue is closed.
            3. Report what was labeled, what was released, and what
               needs a human. If there is nothing to do, say so and
               exit.

            Never edit code or open PRs from this loop. Labels and
            comments only.
